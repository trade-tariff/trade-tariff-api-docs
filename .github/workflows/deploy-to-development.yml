name: Deploy to development

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-2
  ENVIRONMENT: "844815912454"
  IAM_ROLE_ARN: arn:aws:iam::844815912454:role/GithubActions-API-Docs-Role

jobs:
  build-dev:
    uses: ./.github/workflows/build.yml

  deploy:
    runs-on: ubuntu-latest
    needs: build-dev

    steps:
    - uses: actions/download-artifact@v8
      with:
        name: build-artifact
        path: build/

    - uses: aws-actions/configure-aws-credentials@v6.2.1
      with:
        role-to-assume: ${{ env.IAM_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Upload to S3
      run: |
        cd build/
        aws s3 sync . s3://trade-tariff-api-docs-${{ env.ENVIRONMENT }} --delete

  notify:
    runs-on: ubuntu-latest
    needs:
      - build-dev
      - deploy
    if: always()
    steps:
      - id: result
        run: |
          if [[ "${{ needs.build-dev.result }}" == "success" && "${{ needs.deploy.result }}" == "success" ]]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi
      - uses: trade-tariff/trade-tariff-tools/.github/actions/slack-notify@main
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          channel: deployments
          color: ${{ steps.result.outputs.result }}
          title: "${{ github.workflow }}"
          message: "Deploy API docs to development ${{ steps.result.outputs.result }}"
      - run: if [[ "${{ steps.result.outputs.result }}" != "success" ]]; then exit 1; fi
