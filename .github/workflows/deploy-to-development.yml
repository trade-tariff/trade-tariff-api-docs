name: Deploy to development

on:
  push:
    branches-ignore:
      - main
      - "/^dependabot/(?!docker/).*/"
      - "/^hotfix\\/.+/"
  pull_request:
    branches-ignore:
      - main
      - "/^dependabot/(?!docker/).*/"
      - "/^hotfix\\/.+/"
  workflow_dispatch:
    inputs:
      ref:
        description: 'The git ref to deploy'
        required: true
        default: 'main'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-2
  BUNDLE_JOBS: "3"
  BUNDLE_RETRY: "3"
  ENVIRONMENT: "844815912454"
  IAM_ROLE_ARN: arn:aws:iam::844815912454:role/GithubActions-ECS-Deployments-Role
  SKIP: terraform_docs,actionlint-docker

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v3
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - id: ruby-version
        run: echo "RUBY_VERSION=$(cat .ruby-version)" >> "$GITHUB_OUTPUT"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.ruby-version.outputs.RUBY_VERSION }}
          bundler-cache: true

      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-ssh@main
        with:
          ssh-key: ${{ secrets.PRIVATE_SSH_KEY }}

      - run: pip install pre-commit
      - run: pre-commit run --all-files
      - run: |
          if [ -d "/home/runner/work/trade-tariff-api-docs/trade-tariff-api-docs" ]; then
            bundle install
            bundle exec brakeman
          else
            echo "Rails application path not found, forcing scan..."
            bundle exec brakeman --force
          fi

  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.set_artifact.outputs.name }}

    steps:
    - uses: actions/checkout@v4

    - id: ruby-version
      run: echo "RUBY_VERSION=$(cat .ruby-version)" >> "$GITHUB_OUTPUT"

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ steps.ruby-version.outputs.RUBY_VERSION }}
        bundler-cache: true

    - name: Install graphviz
      run: sudo apt-get update && sudo apt-get install -yy graphviz

    - uses: actions/setup-node@v4
      with:
        node-version: '23.11.0'

    - name: Run build command
      run: |
        echo "Running make html..."
        make html || (echo "Make failed with status $?"; exit 1)
        echo "Build complete, checking for output..."
        ls -la
        if [ -d "build" ]; then
          echo "Build directory found with contents:"
          ls -la build/
        else
          echo "Build directory not created!"
          echo "Current directory contents:"
          ls -la
          exit 1
        fi

    - id: set_artifact
      run: echo "name=built-site-$(date +%s)" >> "$GITHUB_OUTPUT"

    - name: Upload build artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.set_artifact.outputs.name }}
        path: build/
        retention-days: 1

  deploy:
    runs-on: ubuntu-latest

    needs: build

    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: ${{ needs.build.outputs.artifact_name }}
        path: build/

    - name: Verify downloaded files
      run: |
        echo "Current directory:"
        pwd
        echo "Downloaded files:"
        ls -la
        ls -la build/
        if [ ! -d "build" ]; then
          echo "Build directory not found after download!"
          exit 1
        fi

    - uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.IAM_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Upload to S3
      run: |
        cd build/
        aws s3 sync . s3://trade-tariff-api-docs-${{ env.ENVIRONMENT }} --delete

    - name: Invalidate cache
      run: |
        DISTRIBUTION_ID=$(aws cloudfront list-distributions \
          --query "DistributionList.Items[*].{id:Id,origin:Origins.Items[0].Id}[?origin=='api'].id" \
          --output text)

          if [ -z "$DISTRIBUTION_ID" ]; then
            echo "Error: Could not find CloudFront distribution"
            exit 1
          fi

        aws cloudfront create-invalidation \
          --distribution-id "${DISTRIBUTION_ID}" \
          --paths "/*"
