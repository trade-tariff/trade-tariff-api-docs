name: Reusable Build

on:
  workflow_call:
    outputs:
       artifact-name:
         description: "The name of the uploaded artifact"
         value: build-artifact

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1.312.0
        with:
          bundler-cache: true

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -yy graphviz

      - name: Build static site
        run: make html

      - name: Run layout and content tests
        run: bundle exec ruby -I test test/rate_limiting_banner_test.rb test/footer_links_test.rb test/analytics_test.rb

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build/
