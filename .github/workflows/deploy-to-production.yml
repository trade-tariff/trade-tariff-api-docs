name: Deploy to production

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - 'Deploy to staging'
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-2
  ENVIRONMENT: "382373577178"
  IAM_ROLE_ARN: arn:aws:iam::382373577178:role/GithubActions-API-Docs-Role

jobs:
  build-prod:
    uses: ./.github/workflows/build.yml

  deploy:
    runs-on: ubuntu-latest
    needs: build-prod

    steps:
    - uses: actions/download-artifact@v8
      with:
        name: build-artifact
        path: build/

    - uses: aws-actions/configure-aws-credentials@v6.2.0
      with:
        role-to-assume: ${{ env.IAM_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Upload to S3
      run: |
        cd build/
        aws s3 sync . s3://trade-tariff-api-docs-${{ env.ENVIRONMENT }} --delete

  notify:
    runs-on: ubuntu-latest
    needs:
      - build-prod
      - deploy
    if: always()
    steps:
      - id: result
        run: |
          if [[ "${{ needs.build-prod.result }}" == "success" && "${{ needs.deploy.result }}" == "success" ]]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi
      - uses: trade-tariff/trade-tariff-tools/.github/actions/slack-notify@main
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          channel: production-deployments
          color: ${{ steps.result.outputs.result }}
          title: "${{ github.workflow }}"
          message: "Deploy API docs to production ${{ steps.result.outputs.result }}"
      - run: if [[ "${{ steps.result.outputs.result }}" != "success" ]]; then exit 1; fi
