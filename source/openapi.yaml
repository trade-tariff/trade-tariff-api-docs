openapi: 3.0.1
info:
  title: UK Trade Tariff API
  version: v2
  description: 'GOV.UK Online Trade Tariff API. Provides access to UK Global Tariff
    and

    Northern Ireland (XI) tariff data including commodity codes, duty rates,

    certificates, quotas, and trade restrictions.


    API version is negotiated via the `Accept` header. All V2 requests must

    include `Accept: application/vnd.hmrc.2.0+json`.

    '
  contact:
    name: Trade Tariff Support
    url: https://www.trade-tariff.service.gov.uk
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
- url: https://www.trade-tariff.service.gov.uk/uk
  description: Production (UK Global Tariff)
- url: https://www.trade-tariff.service.gov.uk/xi
  description: Production (Northern Ireland)
components:
  parameters:
    accept_header:
      name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
        default: application/vnd.hmrc.2.0+json
      description: API version negotiation header. Must be `application/vnd.hmrc.2.0+json`.
  schemas:
    error_response:
      type: object
      description: Standard error response
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
                description: Machine-readable error code
              detail:
                type: string
                description: Human-readable error message
            required:
            - code
            - detail
      required:
      - errors
paths:
  /api/additional_code_types:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    get:
      summary: List all additional code types
      tags:
      - Additional Codes
      description: Returns all additional code types.
      operationId: listAdditionalCodeTypes
      responses:
        '200':
          description: additional code types listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - additional_code_type
                        attributes:
                          type: object
                          properties:
                            additional_code_type_id:
                              type: string
                              nullable: true
                            description:
                              type: string
                              nullable: true
  /api/additional_codes/search:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: description
      in: query
      required: false
      schema:
        type: string
      description: Filter by additional code description (partial match)
    - name: type
      in: query
      required: false
      schema:
        type: string
      description: Filter by additional code type ID
    - name: code
      in: query
      required: false
      schema:
        type: string
      description: Filter by additional code value
    get:
      summary: Search additional codes
      tags:
      - Additional Codes
      description: Returns additional codes matching the search parameters, including
        related goods nomenclatures.
      operationId: searchAdditionalCodes
      responses:
        '200':
          description: additional codes found
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - additional_code
                        attributes:
                          type: object
                          properties:
                            additional_code_type_id:
                              type: string
                              nullable: true
                            additional_code:
                              type: string
                              nullable: true
                            code:
                              type: string
                              nullable: true
                            description:
                              type: string
                              nullable: true
                            formatted_description:
                              type: string
                              nullable: true
  /api/certificate_types:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    get:
      summary: List all certificate types
      tags:
      - Certificates
      description: Returns all certificate types with their descriptions.
      operationId: listCertificateTypes
      responses:
        '200':
          description: certificate types listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - certificate_type
                        attributes:
                          type: object
                          properties:
                            certificate_type_code:
                              type: string
                              nullable: true
                            description:
                              type: string
                              nullable: true
  /api/certificates:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    get:
      summary: List all certificates
      tags:
      - Certificates
      description: Returns all current certificates ordered by type and code.
      operationId: listCertificates
      responses:
        '200':
          description: certificates listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - certificate
                        attributes:
                          type: object
                          properties:
                            certificate_type_code:
                              type: string
                              nullable: true
                            certificate_code:
                              type: string
                              nullable: true
                            description:
                              type: string
                              nullable: true
                            formatted_description:
                              type: string
                              nullable: true
                            guidance_cds:
                              type: string
                              nullable: true
                            certificate_type_description:
                              type: string
                              nullable: true
                            validity_start_date:
                              type: string
                              nullable: true
                              format: date-time
  /api/certificates/search:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: description
      in: query
      required: false
      schema:
        type: string
      description: Filter by certificate description (partial match)
    - name: type
      in: query
      required: false
      schema:
        type: string
      description: Filter by certificate type code
    - name: code
      in: query
      required: false
      schema:
        type: string
      description: Filter by certificate code
    get:
      summary: Search certificates
      tags:
      - Certificates
      description: Returns certificates matching the search parameters, including
        related goods nomenclatures.
      operationId: searchCertificates
      responses:
        '200':
          description: certificates found
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - certificate
                        attributes:
                          type: object
                          properties:
                            certificate_type_code:
                              type: string
                              nullable: true
                            certificate_code:
                              type: string
                              nullable: true
                            description:
                              type: string
                              nullable: true
                            formatted_description:
                              type: string
                              nullable: true
                            guidance_cds:
                              type: string
                              nullable: true
                            certificate_type_description:
                              type: string
                              nullable: true
                            validity_start_date:
                              type: string
                              nullable: true
                              format: date-time
  /api/changes:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    get:
      summary: List recent tariff changes
      tags:
      - Changes
      description: Returns recent tariff changes. The data array may be empty if no
        changes exist for the current date.
      operationId: listChanges
      responses:
        '200':
          description: changes listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - change
                        attributes:
                          type: object
                          properties:
                            goods_nomenclature_sid:
                              type: integer
                              nullable: true
                            goods_nomenclature_item_id:
                              type: string
                              nullable: true
                            productline_suffix:
                              type: string
                              nullable: true
                            end_line:
                              type: boolean
                              nullable: true
                            change_type:
                              type: string
                              nullable: true
                            change_date:
                              type: string
                              nullable: true
                              format: date
  /api/changes/{as_of}:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: as_of
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d{4}-\d{1,2}-\d{1,2}$
      description: 'Date to filter changes by (format: YYYY-M-D, e.g. "2024-1-15")'
    get:
      summary: List tariff changes for a date
      tags:
      - Changes
      description: Returns tariff changes for the specified date. The data array may
        be empty if no changes exist for that date.
      operationId: listChangesAsOf
      responses:
        '200':
          description: changes listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - change
                        attributes:
                          type: object
                          properties:
                            goods_nomenclature_sid:
                              type: integer
                              nullable: true
                            goods_nomenclature_item_id:
                              type: string
                              nullable: true
                            productline_suffix:
                              type: string
                              nullable: true
                            end_line:
                              type: boolean
                              nullable: true
                            change_type:
                              type: string
                              nullable: true
                            change_date:
                              type: string
                              nullable: true
                              format: date
  /api/chapters:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    get:
      summary: List all chapters
      tags:
      - Chapters
      description: Returns all chapters of the tariff.
      operationId: listChapters
      responses:
        '200':
          description: chapters listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                      - id
                      - type
                      - attributes
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - chapter
                        attributes:
                          type: object
                          properties:
                            goods_nomenclature_sid:
                              type: integer
                            goods_nomenclature_item_id:
                              type: string
                            formatted_description:
                              type: string
                              nullable: true
  /api/chapters/{id}:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d{1,2}$
      description: Chapter short code (1–2 digits, e.g. "01")
    get:
      summary: Retrieve a chapter
      tags:
      - Chapters
      description: Returns a single chapter including its headings, section, and guides.
      operationId: getChapter
      responses:
        '200':
          description: chapter found
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: object
                    required:
                    - id
                    - type
                    - attributes
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        enum:
                        - chapter
                      attributes:
                        type: object
                        properties:
                          goods_nomenclature_sid:
                            type: integer
                          goods_nomenclature_item_id:
                            type: string
                          description:
                            type: string
                            nullable: true
                          formatted_description:
                            type: string
                            nullable: true
                          validity_start_date:
                            type: string
                            nullable: true
                            format: date-time
                          validity_end_date:
                            type: string
                            nullable: true
                            format: date-time
                          description_plain:
                            type: string
                            nullable: true
                          chapter_note:
                            type: string
                            nullable: true
                          forum_url:
                            type: string
                            nullable: true
                          section_id:
                            type: integer
                            nullable: true
                      relationships:
                        type: object
                        properties:
                          section:
                            type: object
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
                                    - section
                          guides:
                            type: object
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - guide
                          headings:
                            type: object
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - heading
                  included:
                    type: array
                    description: Related section, guide, and heading objects
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        attributes:
                          type: object
        '404':
          description: chapter not found
  /api/chapters/{id}/changes:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d{1,2}$
      description: Chapter short code (1–2 digits, e.g. "01")
    get:
      summary: List changes for a chapter
      tags:
      - Chapters
      description: Returns the changelog for a chapter.
      operationId: listChapterChanges
      responses:
        '200':
          description: chapter changes listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - change
                        attributes:
                          type: object
                          properties:
                            oid:
                              type: integer
                              nullable: true
                            model_name:
                              type: string
                              nullable: true
                            operation:
                              type: string
                              nullable: true
                            operation_date:
                              type: string
                              nullable: true
                              format: date-time
                        relationships:
                          type: object
                          properties:
                            record:
                              type: object
                              properties:
                                data:
                                  type: object
                                  nullable: true
                  included:
                    type: array
                    items:
                      type: object
  /api/chemical_substances:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: filter[cas_rn]
      in: query
      required: false
      schema:
        type: string
      description: Filter by CAS Registry Number
    - name: filter[cus]
      in: query
      required: false
      schema:
        type: string
      description: Filter by CUS (Customs Union and Statistics) number
    - name: filter[goods_nomenclature_sid]
      in: query
      required: false
      schema:
        type: integer
      description: Filter by goods nomenclature SID
    - name: filter[goods_nomenclature_item_id]
      in: query
      required: false
      schema:
        type: string
      description: Filter by goods nomenclature item ID (commodity code)
    get:
      summary: List chemical substances
      tags:
      - Chemicals
      description: Returns chemical substances, optionally filtered by CAS number,
        CUS, or goods nomenclature.
      operationId: listChemicalSubstances
      responses:
        '200':
          description: chemical substances listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - chemical_substance
                        attributes:
                          type: object
                          properties:
                            cas_rn:
                              type: string
                              nullable: true
                            cus:
                              type: string
                              nullable: true
                            goods_nomenclature_item_id:
                              type: string
                              nullable: true
                            name:
                              type: string
                              nullable: true
  /api/chemicals:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    get:
      summary: List all chemicals
      tags:
      - Chemicals
      description: Returns all chemicals with their CAS numbers and names.
      operationId: listChemicals
      responses:
        '200':
          description: chemicals listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - chemical
                        attributes:
                          type: object
                          properties:
                            id:
                              type: integer
                              nullable: true
                            cas:
                              type: string
                              nullable: true
                            name:
                              type: string
                              nullable: true
  /api/chemicals/search:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: name
      in: query
      required: false
      schema:
        type: string
      description: Search by chemical name
    - name: cas
      in: query
      required: false
      schema:
        type: string
      description: Search by CAS number
    - name: page
      in: query
      required: false
      schema:
        type: integer
      description: Page number
    - name: per_page
      in: query
      required: false
      schema:
        type: integer
      description: Results per page
    get:
      summary: Search chemicals
      tags:
      - Chemicals
      description: Returns chemicals matching the search query.
      operationId: searchChemicals
      responses:
        '200':
          description: chemicals found
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - chemical
                        attributes:
                          type: object
                          properties:
                            id:
                              type: integer
                              nullable: true
                            cas:
                              type: string
                              nullable: true
                            name:
                              type: string
                              nullable: true
  /api/commodities/{id}:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d{10}$
      description: Commodity code (exactly 10 digits)
    get:
      summary: Retrieve a commodity
      tags:
      - Commodities
      description: Returns a single commodity including its measures, footnotes, and
        ancestors.
      operationId: getCommodity
      responses:
        '200':
          description: commodity found
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: object
                    required:
                    - id
                    - type
                    - attributes
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        enum:
                        - commodity
                      attributes:
                        type: object
                        properties:
                          producline_suffix:
                            type: string
                            nullable: true
                          description:
                            type: string
                            nullable: true
                          number_indents:
                            type: integer
                            nullable: true
                          goods_nomenclature_item_id:
                            type: string
                          bti_url:
                            type: string
                            nullable: true
                          formatted_description:
                            type: string
                            nullable: true
                          description_plain:
                            type: string
                            nullable: true
                          consigned:
                            type: boolean
                            nullable: true
                          consigned_from:
                            type: string
                            nullable: true
                          basic_duty_rate:
                            type: string
                            nullable: true
                          meursing_code:
                            type: boolean
                            nullable: true
                          validity_start_date:
                            type: string
                            nullable: true
                            format: date-time
                          validity_end_date:
                            type: string
                            nullable: true
                            format: date-time
                          has_chemicals:
                            type: boolean
                            nullable: true
                          declarable:
                            type: boolean
                      relationships:
                        type: object
                        properties:
                          footnotes:
                            type: object
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - footnote
                          section:
                            type: object
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
                                    - section
                          chapter:
                            type: object
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
                                    - chapter
                          heading:
                            type: object
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
                                    - heading
                          ancestors:
                            type: object
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                          import_measures:
                            type: object
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - measure
                          export_measures:
                            type: object
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - measure
                          import_trade_summary:
                            type: object
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
