  /api/commodities/{id}:
    parameters:
    - $ref: '#/components/parameters/accept_header'
    - name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d{10}$
      description: Declarable commodity code, exactly 10 digits with no spaces or
        punctuation.
    - name: filter[geographical_area_id]
      in: query
      required: false
      schema:
        type: string
      description: Optional country or geographical area code used to remove import
        and export measures that are not relevant to that area.
    - name: filter[meursing_additional_code_id]
      in: query
      required: false
      schema:
        type: string
      description: Optional Meursing additional code used when resolving duty components
        for goods that require Meursing calculations.
    get:
      summary: Retrieve a commodity
      tags:
      - Commodities
      description: 'Use this endpoint when you already have a 10-digit commodity code
        and need the commodity record,

        including classification hierarchy, footnotes, import measures, export measures,
        and duty-related metadata.


        Use the `/uk` server for UK Global Tariff data and the `/xi` server for Northern
        Ireland data. The same

        commodity code can have different measures, duty rates, restrictions, or related
        records in each dataset.


        The commodity must be declarable and valid on the requested date. Use search
        or hierarchy endpoints first

        when you only have a goods description or a partial commodity code.

        '
      operationId: getCommodity
      responses:
        '200':
          description: commodity found
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: object
                    required:
                    - id
                    - type
                    - attributes
                    properties:
                      id:
                        type: string
                        description: JSON:API resource identifier for the commodity
                          goods nomenclature record.
                      type:
                        type: string
                        enum:
                        - commodity
                      attributes:
                        type: object
                        properties:
                          producline_suffix:
                            type: string
                            nullable: true
                            description: Goods nomenclature product-line suffix for
                              this row.
                          description:
                            type: string
                            nullable: true
                            description: Commodity description as stored in the tariff
                              dataset.
                          number_indents:
                            type: integer
                            nullable: true
                            description: Indentation level in the tariff hierarchy.
                          goods_nomenclature_item_id:
                            type: string
                            description: 10-digit commodity code for this goods nomenclature
                              item.
                          bti_url:
                            type: string
                            nullable: true
                            description: GOV.UK guidance URL for applying for a Binding
                              Tariff Information decision.
                          formatted_description:
                            type: string
                            nullable: true
                            description: Commodity description formatted for display.
                          description_plain:
                            type: string
                            nullable: true
                            description: Commodity description with formatting removed.
                          consigned:
                            type: boolean
                            nullable: true
                            description: Whether the commodity description identifies
                              goods as consigned from one or more countries.
                          consigned_from:
                            type: string
                            nullable: true
                            description: Country or countries extracted from "consigned
                              from" wording in the commodity description.
                          basic_duty_rate:
                            type: string
                            nullable: true
                            description: Summary basic third-country duty rate, when
                              one can be derived from applicable import measures.
                          meursing_code:
                            type: boolean
                            nullable: true
                            description: Whether Meursing additional code information
                              may be needed for this commodity.
                          validity_start_date:
                            type: string
                            nullable: true
                            format: date-time
                            description: Date and time from which this commodity description
                              period is valid.
                          validity_end_date:
                            type: string
                            nullable: true
                            format: date-time
                            description: Date and time after which this commodity
                              description period is no longer valid, or null when
                              open-ended.
                          has_chemicals:
                            type: boolean
                            nullable: true
                            description: Whether chemical substance records are associated
                              with this commodity.
                          declarable:
                            type: boolean
                            description: true when this commodity can be declared
                              on a customs declaration.
                      relationships:
                        type: object
                        properties:
                          footnotes:
                            type: object
                            description: Footnotes linked to the commodity, including
                              legal or usage notes that may affect classification
                              or measures.
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - footnote
                          section:
                            type: object
                            description: Tariff section containing the commodity.
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
                                    - section
                          chapter:
                            type: object
                            description: Tariff chapter containing the commodity.
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
                                    - chapter
                          heading:
                            type: object
                            description: Tariff heading containing the commodity.
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
                                    - heading
                          ancestors:
                            type: object
                            description: Parent goods nomenclature records in the
                              classification hierarchy.
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                          import_measures:
                            type: object
                            description: Import duties, controls, restrictions, quotas,
                              and other import measures applicable to the commodity.
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - measure
                          export_measures:
                            type: object
                            description: Export controls, restrictions, duties, and
                              other export measures applicable to the commodity.
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - measure
                          import_trade_summary:
                            type: object
                            description: Summary trade statistics for imports of the
                              commodity, when available.
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
                                    - import_trade_summary
                      meta:
                        type: object
                        nullable: true
                        properties:
                          duty_calculator:
                            type: object
                            nullable: true
                  included:
                    type: array
                    description: Related resources included with the commodity response,
                      such as hierarchy, footnote, measure, duty, geographical area,
                      and quota records.
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        attributes:
                          type: object
        '404':
          description: commodity not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '422':
          description: unprocessable content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
