openapi: 3.0.1
info:
  title: UK Trade Tariff API
  version: v2
  description: 'GOV.UK Online Trade Tariff API. Provides access to UK Global Tariff
    and

    Northern Ireland (XI) tariff data including commodity codes, duty rates,

    certificates, quotas, and trade restrictions.


    API version is negotiated via the `Accept` header. All V2 requests must

    include `Accept: application/vnd.hmrc.2.0+json`.

    '
  contact:
    name: Trade Tariff Support
    url: https://www.trade-tariff.service.gov.uk
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
- url: https://www.trade-tariff.service.gov.uk/uk
  description: Production (UK Global Tariff)
- url: https://www.trade-tariff.service.gov.uk/xi
  description: Production (Northern Ireland)
security:
- oauth2_client_credentials:
  - tariff/read
components:
  securitySchemes:
    oauth2_client_credentials:
      type: oauth2
      description: OAuth 2.0 client credentials authentication for Trade Tariff API
        clients.
      flows:
        clientCredentials:
          tokenUrl: https://auth.id.trade-tariff.service.gov.uk/oauth2/token
          scopes:
            tariff/read: Read public Trade Tariff API data.
            tariff/write: Write Trade Tariff API data where an endpoint explicitly
              supports it.
  parameters:
    accept_header:
      name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
        default: application/vnd.hmrc.2.0+json
      description: API version negotiation header. Use `application/vnd.hmrc.2.0+json`
        for V2 JSON responses.
    AsOfDate:
      name: as_of
      in: query
      required: false
      schema:
        type: string
        format: date
        pattern: ^\d{4}-\d{2}-\d{2}$
      description: Return tariff data that was valid on this date, formatted as `YYYY-MM-DD`.
        Defaults to the current date when omitted.
    Include:
      name: include
      in: query
      required: false
      schema:
        type: string
      description: Comma-separated JSON:API relationship paths to include in the response.
        Supported values vary by endpoint.
    Filter:
      name: filter
      in: query
      required: false
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties: true
      description: Endpoint-specific filter object using `filter[name]=value` query
        parameters.
    PageNumber:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for paginated responses. Defaults to `1`.
    PageSize:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 20
      description: Number of records to return per page for paginated responses. Defaults
        to `20` when supported by the endpoint.
  schemas:
    StandardErrorResponse:
      oneOf:
      - $ref: '#/components/schemas/JsonApiErrorResponse'
      - $ref: '#/components/schemas/SimpleErrorResponse'
      description: Error response returned by documented V2 endpoint failures.
    SimpleErrorResponse:
      type: object
      description: Error response returned by shared API rescue handlers.
      properties:
        error:
          type: string
          description: Short human-readable error message.
        url:
          type: string
          format: uri
          description: Request URL that produced the error, when supplied by the endpoint.
      required:
      - error
    JsonApiErrorResponse:
      type: object
      description: JSON:API error response returned by V2 endpoints.
      properties:
        errors:
          type: array
          description: One or more errors that explain why the request failed.
          items:
            type: object
            properties:
              status:
                oneOf:
                - type: string
                - type: integer
                description: HTTP status code associated with the error, when supplied
                  by the endpoint.
              title:
                type: string
                description: Short error title or affected attribute, when supplied
                  by the endpoint.
              detail:
                type: string
                description: Human-readable explanation of the error.
              source:
                type: object
                description: Location of the invalid request value, when supplied
                  by the endpoint.
                properties:
                  pointer:
                    type: string
                    description: JSON Pointer to the related request member.
      required:
      - errors
    error_response:
      type: object
      description: Deprecated alias for JSON:API error responses. Use `JsonApiErrorResponse`
        for new endpoint documentation.
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              status:
                oneOf:
                - type: string
                - type: integer
                description: HTTP status code associated with the error, when supplied
                  by the endpoint.
              title:
                type: string
                description: Short error title or affected attribute, when supplied
                  by the endpoint.
              detail:
                type: string
                description: Human-readable explanation of the error.
              source:
                type: object
                description: Location of the invalid request value, when supplied
                  by the endpoint.
                properties:
                  pointer:
                    type: string
                    description: JSON Pointer to the related request member.
      required:
      - errors
paths:
  /api/additional_code_types:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    get:
      summary: List all additional code types
      tags:
      - Additional Codes
      description: Returns all additional code types.
      operationId: listAdditionalCodeTypes
      responses:
        '200':
          description: additional code types listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - additional_code_type
                        attributes:
                          type: object
                          properties:
                            additional_code_type_id:
                              type: string
                              nullable: true
                            description:
                              type: string
                              nullable: true
  /api/additional_codes/search:
    parameters:
    - $ref: '#/components/parameters/accept_header'
    - name: description
      in: query
      required: false
      schema:
        type: string
      description: Filter by additional code description (partial match)
    - name: type
      in: query
      required: false
      schema:
        type: string
      description: Filter by additional code type ID which will be 1-character. Must
        be passed together with the `code` parameter.
    - name: code
      in: query
      required: false
      schema:
        type: string
      description: Filter by additional code value which will be a 3-character ID
        and may also include letters. Must be passed together with the `type` parameter.
    get:
      summary: Search additional codes
      tags:
      - Additional Codes
      description: Returns additional codes matching the search parameters, including
        related goods nomenclatures.
      operationId: searchAdditionalCodes
      responses:
        '200':
          description: additional codes found
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - additional_code
                        attributes:
                          type: object
                          properties:
                            additional_code_type_id:
                              type: string
                              nullable: true
                              description: 1-character additional code type ID. See
                                `GET /api/additional_code_types` for the corresponding
                                description.
                            additional_code:
                              type: string
                              nullable: true
                              description: The 3-character additional code value on
                                its own, without the type ID prefix.
                            code:
                              type: string
                              nullable: true
                              description: 'The full additional code: the 1-character
                                `additional_code_type_id` followed by the 3-character
                                `additional_code`.'
                            description:
                              type: string
                              nullable: true
                            formatted_description:
                              type: string
                              nullable: true
                        relationships:
                          type: object
                          properties:
                            goods_nomenclatures:
                              type: object
                              description: Goods nomenclature records (chapters, headings,
                                commodities, subheadings) associated with this additional
                                code.
                              properties:
                                data:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      id:
                                        type: string
                                      type:
                                        type: string
                  included:
                    type: array
                    description: Goods nomenclature records included via the `goods_nomenclatures`
                      relationship.
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        attributes:
                          type: object
        '422':
          description: invalid search params description required when type and code
            are blank
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '404':
          description: not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
  /api/certificate_types:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: Accept header for V2 JSON responses. Use `application/vnd.hmrc.2.0+json`.
    get:
      summary: List all certificate types
      tags:
      - Certificates
      description: List certificate type codes used to group certificate document
        codes.
      operationId: listCertificateTypes
      responses:
        '200':
          description: certificate types listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Certificate type code.
                        type:
                          type: string
                          enum:
                          - certificate_type
                          description: JSON:API resource type.
                        attributes:
                          type: object
                          properties:
                            certificate_type_code:
                              type: string
                              nullable: true
                              description: Single-character certificate type code.
                            description:
                              type: string
                              nullable: true
                              description: Certificate type description.
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '404':
          description: not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '422':
          description: unprocessable content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
  /api/certificates:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: Accept header for V2 JSON responses. Use `application/vnd.hmrc.2.0+json`.
    get:
      summary: List all certificates
      tags:
      - Certificates
      description: List current certificate document codes, ordered by certificate
        type code and certificate code.
      operationId: listCertificates
      responses:
        '200':
          description: certificates listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                      - id
                      - type
                      - attributes
                      properties:
                        id:
                          type: string
                          description: Combined certificate type and certificate code.
                        type:
                          type: string
                          enum:
                          - certificate
                          description: JSON:API resource type.
                        attributes:
                          type: object
                          properties:
                            certificate_type_code:
                              type: string
                              nullable: true
                              description: Single-character document type code.
                            certificate_code:
                              type: string
                              nullable: true
                              description: Document code within the certificate type.
                            description:
                              type: string
                              nullable: true
                              description: Certificate description.
                            formatted_description:
                              type: string
                              nullable: true
                              description: Certificate description formatted for display.
                            guidance_cds:
                              type: string
                              nullable: true
                              description: CDS guidance text for the certificate,
                                when available.
                            certificate_type_description:
                              type: string
                              nullable: true
                              description: Description of the certificate type, when
                                returned by this endpoint.
                            validity_start_date:
                              type: string
                              nullable: true
                              format: date-time
                              description: Date and time from which this certificate
                                description is valid.
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '404':
          description: not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '422':
          description: unprocessable content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
  /api/certificates/search:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: Accept header for V2 JSON responses. Use `application/vnd.hmrc.2.0+json`.
    - name: description
      in: query
      required: false
      schema:
        type: string
      description: Partial certificate description to search for. Required when `type`
        and `code` are both omitted.
    - name: type
      in: query
      required: false
      schema:
        type: string
      description: Certificate type code. Must be supplied with `code` when used.
    - name: code
      in: query
      required: false
      schema:
        type: string
      description: Certificate code. Must be supplied with `type` when used.
    get:
      summary: Search certificates
      tags:
      - Certificates
      description: Search certificate document codes by description, or by type and
        code together. Results include matching certificates and can include related
        goods nomenclatures.
      operationId: searchCertificates
      responses:
        '200':
          description: certificates found
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                      - id
                      - type
                      - attributes
                      properties:
                        id:
                          type: string
                          description: Combined certificate type and certificate code.
                        type:
                          type: string
                          enum:
                          - certificates
                          description: JSON:API resource type returned by certificate
                            search.
                        attributes:
                          type: object
                          properties:
                            certificate_type_code:
                              type: string
                              nullable: true
                              description: Single-character document type code.
                            certificate_code:
                              type: string
                              nullable: true
                              description: Document code within the certificate type.
                            description:
                              type: string
                              nullable: true
                              description: Certificate description.
                            formatted_description:
                              type: string
                              nullable: true
                              description: Certificate description formatted for display.
                            guidance_cds:
                              type: string
                              nullable: true
                              description: CDS guidance text for the certificate,
                                when available.
                        relationships:
                          type: object
                          properties:
                            goods_nomenclatures:
                              type: object
                              description: Goods nomenclature records linked to matching
                                measures.
        '422':
          description: invalid certificate search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '400':
          description: bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
        '404':
          description: not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
  /api/changes:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    get:
      summary: List recent tariff changes
      tags:
      - Changes
      description: Returns recent tariff changes. The data array may be empty if no
        changes exist for the current date.
      operationId: listChanges
      responses:
        '200':
          description: changes listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - change
                        attributes:
                          type: object
                          properties:
                            goods_nomenclature_sid:
                              type: integer
                              nullable: true
                            goods_nomenclature_item_id:
                              type: string
                              nullable: true
                            productline_suffix:
                              type: string
                              nullable: true
                            end_line:
                              type: boolean
                              nullable: true
                            change_type:
                              type: string
                              nullable: true
                            change_date:
                              type: string
                              nullable: true
                              format: date
  /api/changes/{as_of}:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: as_of
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d{4}-\d{1,2}-\d{1,2}$
      description: 'Date to filter changes by (format: YYYY-M-D, e.g. "2024-1-15")'
    get:
      summary: List tariff changes for a date
      tags:
      - Changes
      description: Returns tariff changes for the specified date. The data array may
        be empty if no changes exist for that date.
      operationId: listChangesAsOf
      responses:
        '200':
          description: changes listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - change
                        attributes:
                          type: object
                          properties:
                            goods_nomenclature_sid:
                              type: integer
                              nullable: true
                            goods_nomenclature_item_id:
                              type: string
                              nullable: true
                            productline_suffix:
                              type: string
                              nullable: true
                            end_line:
                              type: boolean
                              nullable: true
                            change_type:
                              type: string
                              nullable: true
                            change_date:
                              type: string
                              nullable: true
                              format: date
  /api/chapters:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    get:
      summary: List all chapters
      tags:
      - Chapters
      description: Returns all chapters of the tariff.
      operationId: listChapters
      responses:
        '200':
          description: chapters listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                      - id
                      - type
                      - attributes
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - chapter
                        attributes:
                          type: object
                          properties:
                            goods_nomenclature_sid:
                              type: integer
                            goods_nomenclature_item_id:
                              type: string
                            formatted_description:
                              type: string
                              nullable: true
  /api/chapters/{id}:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d{1,2}$
      description: Chapter short code (1–2 digits, e.g. "01")
    get:
      summary: Retrieve a chapter
      tags:
      - Chapters
      description: Returns a single chapter including its headings, section, and guides.
      operationId: getChapter
      responses:
        '200':
          description: chapter found
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: object
                    required:
                    - id
                    - type
                    - attributes
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        enum:
                        - chapter
                      attributes:
                        type: object
                        properties:
                          goods_nomenclature_sid:
                            type: integer
                          goods_nomenclature_item_id:
                            type: string
                          description:
                            type: string
                            nullable: true
                          formatted_description:
                            type: string
                            nullable: true
                          validity_start_date:
                            type: string
                            nullable: true
                            format: date-time
                          validity_end_date:
                            type: string
                            nullable: true
                            format: date-time
                          description_plain:
                            type: string
                            nullable: true
                          chapter_note:
                            type: string
                            nullable: true
                          forum_url:
                            type: string
                            nullable: true
                          section_id:
                            type: integer
                            nullable: true
                      relationships:
                        type: object
                        properties:
                          section:
                            type: object
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
                                    - section
                          guides:
                            type: object
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - guide
                          headings:
                            type: object
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - heading
                  included:
                    type: array
                    description: Related section, guide, and heading objects
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        attributes:
                          type: object
        '404':
          description: chapter not found
  /api/chapters/{id}/changes:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d{1,2}$
      description: Chapter short code (1–2 digits, e.g. "01")
    get:
      summary: List changes for a chapter
      tags:
      - Chapters
      description: Returns the changelog for a chapter.
      operationId: listChapterChanges
      responses:
        '200':
          description: chapter changes listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - change
                        attributes:
                          type: object
                          properties:
                            oid:
                              type: integer
                              nullable: true
                            model_name:
                              type: string
                              nullable: true
                            operation:
                              type: string
                              nullable: true
                            operation_date:
                              type: string
                              nullable: true
                              format: date-time
                        relationships:
                          type: object
                          properties:
                            record:
                              type: object
                              properties:
                                data:
                                  type: object
                                  nullable: true
                  included:
                    type: array
                    items:
                      type: object
  /api/chemical_substances:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: filter[cas_rn]
      in: query
      required: false
      schema:
        type: string
      description: Filter by CAS Registry Number
    - name: filter[cus]
      in: query
      required: false
      schema:
        type: string
      description: Filter by CUS (Customs Union and Statistics) number
    - name: filter[goods_nomenclature_sid]
      in: query
      required: false
      schema:
        type: integer
      description: Filter by goods nomenclature SID
    - name: filter[goods_nomenclature_item_id]
      in: query
      required: false
      schema:
        type: string
      description: Filter by goods nomenclature item ID (commodity code)
    get:
      summary: List chemical substances
      tags:
      - Chemicals
      description: Returns chemical substances, optionally filtered by CAS number,
