                          type: string
                        type:
                          type: string
                          enum:
                          - simplified_procedural_code_measure
                        attributes:
                          type: object
                          properties:
                            simplified_procedural_code:
                              type: string
                              nullable: true
                            goods_nomenclature_item_id:
                              type: string
                              nullable: true
                            goods_nomenclature_label:
                              type: string
                              nullable: true
                            validity_start_date:
                              type: string
                              nullable: true
