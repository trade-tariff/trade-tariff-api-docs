  /api/subheadings/{id}:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d{10}-\d{2}$
      description: Subheading id in the format "{10-digit-code}-{producline_suffix}"
        (e.g. "0101210000-10")
    get:
      summary: Retrieve a subheading
      tags:
      - Subheadings
      description: Returns a single subheading including its commodities, footnotes,
        and ancestors.
      operationId: getSubheading
      responses:
        '200':
          description: subheading found
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: object
                    required:
                    - id
                    - type
                    - attributes
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        enum:
                        - subheading
                      attributes:
                        type: object
                        properties:
                          goods_nomenclature_item_id:
                            type: string
                          goods_nomenclature_sid:
                            type: integer
                          number_indents:
                            type: integer
                            nullable: true
                          producline_suffix:
                            type: string
                          description:
                            type: string
                            nullable: true
                          formatted_description:
                            type: string
                            nullable: true
                          validity_start_date:
                            type: string
                            nullable: true
                            format: date-time
                          validity_end_date:
                            type: string
                            nullable: true
                            format: date-time
                          description_plain:
                            type: string
                            nullable: true
                          declarable:
                            type: boolean
                      relationships:
                        type: object
                        properties:
                          section:
                            type: object
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
                                    - section
                          chapter:
                            type: object
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
                                    - chapter
                          heading:
                            type: object
                            properties:
                              data:
                                type: object
                                nullable: true
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                    enum:
                                    - heading
                          commodities:
                            type: object
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - commodity
                          footnotes:
                            type: object
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - footnote
                          ancestors:
                            type: object
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                  included:
                    type: array
                    description: Related section, chapter, heading, commodity, footnote,
                      and ancestor objects
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        attributes:
                          type: object
        '404':
          description: subheading not found
