                  format: date
                  pattern: ^\d{4}-\d{2}-\d{2}$
                  description: Date for the tariff data snapshot, formatted as `YYYY-MM-DD`.
                    Defaults to today when omitted or invalid.
                request_id:
                  type: string
                  description: Optional request identifier used in search instrumentation.
                resource_id:
                  type: string
                  description: Optional search suggestion identifier used to narrow
                    exact-match lookup.
        description: JSON request body containing search parameters.
  /api/search_references:
