                              nullable: true
                            title:
                              type: string
                              nullable: true
                            referenced_class:
                              type: string
                              nullable: true
  /api/sections:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    get:
      summary: List all sections
      tags:
      - Sections
      description: Returns all sections of the tariff. Sections group chapters into
        broad categories of goods.
      operationId: listSections
      responses:
        '200':
          description: sections listed
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                      - id
                      - type
                      - attributes
                      properties:
                        id:
                          type: string
                          description: Section ID
                        type:
                          type: string
                          enum:
                          - section
                        attributes:
                          type: object
                          required:
                          - id
                          - numeral
                          - title
                          - position
                          properties:
                            id:
                              type: integer
                            numeral:
                              type: string
                              description: Roman numeral (e.g. I, II, XIV)
                            title:
                              type: string
                            position:
                              type: integer
                              description: Ordering position
                            chapter_from:
                              type: string
                              nullable: true
                              description: First chapter number in this section
                            chapter_to:
                              type: string
                              nullable: true
                              description: Last chapter number in this section
  /api/sections/{id}:
    parameters:
    - name: Accept
      in: header
      required: true
      schema:
        type: string
        enum:
        - application/vnd.hmrc.2.0+json
      description: API version negotiation header
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Section position number
    get:
      summary: Retrieve a section
      tags:
      - Sections
      description: Returns a single section including its chapters and any associated
        guides.
      operationId: getSection
      responses:
        '200':
          description: section found
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: object
                    required:
                    - id
                    - type
                    - attributes
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        enum:
                        - section
                      attributes:
                        type: object
                        required:
                        - id
                        - numeral
                        - title
                        - position
                        properties:
                          id:
                            type: integer
                          numeral:
                            type: string
                          title:
                            type: string
                          position:
                            type: integer
                          chapter_from:
                            type: string
                            nullable: true
                          chapter_to:
                            type: string
                            nullable: true
                          description_plain:
                            type: string
                            nullable: true
                          section_note:
                            type: string
                            nullable: true
                            description: Legal note text, present when a note exists
                      relationships:
                        type: object
                        properties:
                          chapters:
                            type: object
                            properties:
                              data:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                      enum:
                                      - chapter
                  included:
                    type: array
                    description: Related chapter objects
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum:
                          - chapter
                        attributes:
                          type: object
                          properties:
                            goods_nomenclature_sid:
                              type: integer
                            goods_nomenclature_item_id:
                              type: string
                            headings_from:
                              type: string
                              nullable: true
                            headings_to:
                              type: string
                              nullable: true
                            description:
                              type: string
                              nullable: true
                            formatted_description:
                              type: string
                              nullable: true
                            validity_start_date:
                              type: string
                              nullable: true
                              format: date-time
                            validity_end_date:
                              type: string
                              nullable: true
                              format: date-time
        '400':
          description: invalid section id — id must be an integer
