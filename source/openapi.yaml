                          type: object
                          required:
                          - id
                          - numeral
                          - title
                          - position
                          properties:
                            id:
                              type: integer
                            numeral:
                              type: string
                              description: Roman numeral (e.g. I, II, XIV)
                            title:
                              type: string
                            position:
                              type: integer
                              description: Ordering position
                            chapter_from:
                              type: string
